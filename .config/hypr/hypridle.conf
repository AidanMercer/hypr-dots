# hypridle — idle daemon. Watches for inactivity and fires actions.
# Started by Hyprland via `exec-once = hypridle` in hyprland.conf.

general {
    # How to lock: the Quickshell lock (animated per-theme clock + PAM). If that
    # IPC fails for any reason (quickshell not running), fall back to hyprlock so
    # the screen never just stays unlocked.
    lock_cmd = qs ipc call lock lock || (pidof hyprlock || ~/.config/hypr/lock.sh)

    # Lock before the system sleeps, and turn the display back on
    # after waking (it can otherwise stay black on resume).
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd  = hyprctl dispatch dpms on
}

# auto-lock off for now — uncomment to bring back the 5 min lock
# listener {
