# hypridle — idle daemon. The shell runs this unconditionally (ShortcutsPopup
# owns the process, no exec-once): lock-before-sleep must hold even with
# auto-lock off, and hypridle is what takes the logind sleep inhibitor so the
# lock is up before suspend. The auto-lock toggle no longer starts/stops the
# daemon — it writes $XDG_RUNTIME_DIR/qs-autolock and the listeners check it.

general {
    # How to lock: the Quickshell lock (animated per-theme clock + PAM). If that
    # IPC fails for any reason (quickshell not running), fall back to hyprlock so
    # the screen never just stays unlocked.
    lock_cmd = qs ipc call lock lock || (pidof hyprlock || ~/.config/hypr/lock.sh)

    # Lock before the system sleeps — toggle or not — and turn the display
    # back on after waking (it can otherwise stay black on resume).
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd  = hyprctl dispatch dpms on
}

# lock after 5 min idle — only while the auto-lock toggle is on
listener {
    timeout    = 300
    on-timeout = [ "$(cat "$XDG_RUNTIME_DIR/qs-autolock" 2>/dev/null)" = "1" ] && loginctl lock-session
}

# screens off after 10 min (same toggle) — no frame callbacks means the lock's
# blur/canvas/animation rendering all stall, so the shell truly idles overnight
listener {
    timeout    = 600
    on-timeout = [ "$(cat "$XDG_RUNTIME_DIR/qs-autolock" 2>/dev/null)" = "1" ] && hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}
