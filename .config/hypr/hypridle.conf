# hypridle — idle daemon. Watches for inactivity and fires actions.
# Started by Hyprland via `exec-once = hypridle` in hyprland.conf.

general {
    # How to lock. `pidof hyprlock || hyprlock` avoids stacking a
    # second hyprlock instance if a lock screen is already up.
    lock_cmd = pidof hyprlock || hyprlock

    # Lock before the system sleeps, and turn the display back on
    # after waking (it can otherwise stay black on resume).
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd  = hyprctl dispatch dpms on
}

# 2.5 min — dim the screen as a gentle "about to lock" warning.
# brightnessctl -s saves the current level; -r restores it on activity.
# (Mainly affects the laptop; the desktop monitor has no backlight
#  device, where these commands are a harmless no-op.)
listener {
    timeout    = 150
    on-timeout = brightnessctl -s set 10%
    on-resume  = brightnessctl -r
}

# 5 min — lock the session, which triggers lock_cmd above (hyprlock).
listener {
    timeout    = 300
    on-timeout = loginctl lock-session
}

# 5.5 min — turn the display off to save power once locked.
listener {
    timeout    = 330
    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}

# 30 min — suspend. Commented out by default: suspend on the Nvidia
# desktop can be flaky. Uncomment if you want it (laptop-friendly).
# listener {
#     timeout    = 1800
#     on-timeout = systemctl suspend
# }
