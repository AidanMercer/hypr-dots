# hypridle — idle daemon. Watches for inactivity and fires actions.
# Started by Hyprland via `exec-once = hypridle` in hyprland.conf.

general {
    # How to lock. lock.sh repoints hyprlock at the live wallpaper, then locks.
    # `pidof hyprlock ||` avoids stacking a second instance if already up.
    lock_cmd = pidof hyprlock || ~/.config/hypr/lock.sh

    # Lock before the system sleeps, and turn the display back on
    # after waking (it can otherwise stay black on resume).
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd  = hyprctl dispatch dpms on
}

# 5 min — lock the session, which triggers lock_cmd above (hyprlock).
# This is the only idle action: no dimming, no display power-off (dpms),
# and no suspend. The screen stays on at full brightness; it just locks.
listener {
    timeout    = 300
    on-timeout = loginctl lock-session
}
