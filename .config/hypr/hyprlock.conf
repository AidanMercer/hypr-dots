general {
    hide_cursor = true
}

background {
    monitor =
    path = screenshot
    blur_passes = 4
    blur_size = 8
    contrast = 0.9
    brightness = 0.75
    vibrancy = 0.15
    noise = 0.02
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%H:%M')"
    color = rgba(e6e6f0ff)
    font_size = 96
    font_family = monospace

    position = 0, 220
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date '+%A, %B %d')"
    color = rgba(a8a8b8ff)
    font_size = 18
    font_family = monospace

    position = 0, 110
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 320, 50
    outline_thickness = 1
    rounding = 14

    dots_size = 0.25
    dots_spacing = 0.30
    dots_center = true

    outer_color = rgba(ffffff2e)
    inner_color = rgba(1a1a229a)
    font_color = rgba(e6e6f0ff)
    check_color = rgba(a8b5e8ff)
    fail_color = rgba(e88e8eff)

    placeholder_text = <i>password</i>
    fail_text = <i>wrong</i>
    fade_on_empty = true

    position = 0, -130
    halign = center
    valign = center
}
