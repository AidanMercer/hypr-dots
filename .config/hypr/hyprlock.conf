# Lock screen, inspired by the moon theme's desktop clock
# (~/.config/themes/moon/clock.qml): just the signature chromatic-aberration neon
# time — cyan + magenta ghosts behind the neon main — big and centered, with a
# thin neon divider and the date. Everything else from the desktop HUD (rail,
# header/footer, seconds, scanlines) is dropped to keep it open and uncluttered.
# Password stays as plain boxless dots. Colors come from the theme pipeline
# ($lock_*), so it re-tints per theme. Regenerated by theme-colors.sh.
source = ~/.cache/theme/hypr-colors.conf

general {
    hide_cursor = true
}

background {
    monitor =
    path = ~/.cache/lockwall.jpg
    blur_passes = 2
    blur_size = 5
    contrast = 1.0
    brightness = 0.8
    vibrancy = 0.25
    noise = 0.01
}

# ── the time — chromatic-aberration stack (magenta + cyan ghosts, neon top) ──
label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%H:%M')"
    color = $lock_magenta
    font_size = 150
    font_family = Noto Sans Mono Black

    position = 6, 70
    halign = center
    valign = center
}
label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%H:%M')"
    color = $lock_cyan
    font_size = 150
    font_family = Noto Sans Mono Black

    position = -6, 70
    halign = center
    valign = center
}
label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%H:%M')"
    color = $lock_accent
    font_size = 150
    font_family = Noto Sans Mono Black

    position = 0, 70
    halign = center
    valign = center
}

# neon divider — dim track with a solid neon run on the left
shape { monitor =; size = 380, 2; color = $lock_dim;    rounding = 0; border_size = 0; position = 0, -45;  halign = center; valign = center }
shape { monitor =; size = 110, 4; color = $lock_accent; rounding = 0; border_size = 0; position = -135, -45; halign = center; valign = center }

# date
label {
    monitor =
    text = cmd[update:60000] echo "$(date '+%a   %d.%m.%Y' | tr a-z A-Z)"
    color = $lock_cyan
    font_size = 18
    font_family = Noto Sans Mono Medium

    position = 0, -82
    halign = center
    valign = center
}

# ── password — plain boxless dots ───────────────────────────────────────────
input-field {
    monitor =
    size = 320, 50
    outline_thickness = 0
    rounding = 14

    dots_size = 0.25
    dots_spacing = 0.30
    dots_center = true

    swap_font_color = true

    outer_color = rgba(00000000)
    inner_color = rgba(00000000)
    font_color = $lock_accent
    check_color = rgba(00000000)
    fail_color = $lock_fail

    placeholder_text = <i>password</i>
    fail_text = <i>wrong</i>
    fade_on_empty = true

    position = 0, -240
    halign = center
    valign = center
}
