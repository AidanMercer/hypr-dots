# themed accents ($lock_fg/$lock_dim/$lock_accent/$lock_fail), regenerated per
# theme by ~/dotfiles/.config/hypr/theme-colors.sh.
source = ~/.cache/theme/hypr-colors.conf

general {
    hide_cursor = true
}

background {
    monitor =
    path = ~/.cache/lockwall.jpg
    blur_passes = 3
    blur_size = 7
    contrast = 0.95
    brightness = 0.8
    vibrancy = 0.25
    noise = 0.02
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%H:%M')"
    color = $lock_fg
    font_size = 96
    font_family = monospace

    position = 0, 220
    halign = center
    valign = center
}

# neon accent bar under the clock — the signature cyberpunk element
shape {
    monitor =
    size = 260, 3
    color = $lock_accent
    rounding = 0
    border_size = 0
    position = 0, 168
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date '+%A, %B %d')"
    color = $lock_dim
    font_size = 18
    font_family = monospace

    position = 0, 120
    halign = center
    valign = center
}

# little HUD status line, Cyberpunk-2077-ish
label {
    monitor =
    text = // SYSTEM LOCKED
    color = $lock_accent
    font_size = 12
    font_family = monospace

    position = 0, 80
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 320, 50
    outline_thickness = 0
    rounding = 14

    dots_size = 0.25
    dots_spacing = 0.30
    dots_center = true

    # No box: outline off and box fills transparent. swap_font_color makes the
    # check/fail states recolor the dots instead of filling a box. check_color
    # is transparent so the dots vanish the instant you submit (no blue flash);
    # on failure the dots are gone and the red "wrong" text shows.
    swap_font_color = true

    outer_color = rgba(00000000)
    inner_color = rgba(00000000)
    font_color = $lock_fg
    check_color = rgba(00000000)
    fail_color = $lock_fail

    placeholder_text = <i>password</i>
    fail_text = <i>wrong</i>
    fade_on_empty = true

    position = 0, -130
    halign = center
    valign = center
}

# accent underline beneath the field — reads like a terminal input
shape {
    monitor =
    size = 320, 2
    color = $lock_accent
    rounding = 0
    border_size = 0
    position = 0, -162
    halign = center
    valign = center
}
