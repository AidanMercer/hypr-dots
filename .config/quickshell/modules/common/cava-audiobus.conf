# cava config for the shared AudioBus feed (modules/common/AudioBus.qml).
# raw ascii on stdout: one line per frame, 40 values 0..1000 separated by ';'.
# autosens OFF so the energy is ABSOLUTE (quiet stays quiet) — the same choice as
# the moon lyric silence detector, since widgets want real loudness not auto-gain.

[general]
bars = 40
framerate = 60
autosens = 0
sensitivity = 100

[output]
method = raw
raw_target = /dev/stdout
data_format = ascii
ascii_max_range = 1000
channels = mono

[smoothing]
noise_reduction = 0.30
